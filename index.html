<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Galaxia para Ara 🌷</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap');

    html,body { margin:0; height:100%; background:#000; overflow:hidden; font-family:'Caveat',cursive; cursor:none; }
    #galaxy-canvas { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }
    #fx { position:fixed; inset:0; pointer-events:none; z-index:10; }

    /* ── CURSOR ── */
    #cursor {
      position:fixed; z-index:9999; pointer-events:none;
      width:20px; height:20px; border-radius:50%;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle, #fff 0%, #ff6eb4 58%, transparent 100%);
      box-shadow:0 0 10px rgba(255,110,180,.9), 0 0 24px rgba(255,110,180,.3);
      transition:width .12s, height .12s;
    }
    #cursor.drag  { width:28px; height:28px; background:radial-gradient(circle,#fff 0%,#c97fd6 58%,transparent 100%); box-shadow:0 0 14px rgba(200,120,240,.9),0 0 30px rgba(200,120,240,.35); }
    #cursor.hover { width:34px; height:34px; background:radial-gradient(circle,#fff 0%,#ff3d8a 50%,transparent 100%); box-shadow:0 0 18px rgba(255,60,140,1),0 0 40px rgba(255,60,140,.4); }

    /* ── INTRO ── */
    #intro {
      position:fixed; inset:0; z-index:200;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:#000; transition:opacity 1.4s ease;
    }
    #intro.out { opacity:0; pointer-events:none; }
    #intro-tulip { font-size:5.5rem; animation:floatY 3s ease-in-out infinite; filter:drop-shadow(0 0 22px #ff80c0); }
    #intro-label { margin-top:1.4rem; font-size:1.7rem; letter-spacing:3px; color:#ffb3d9; text-shadow:0 0 14px #ff6eb4; animation:pulse 2s ease-in-out infinite; }

    /* ── PILL ── */
    .pill {
      position:fixed; top:12px; left:50%; transform:translateX(-50%);
      padding:6px 16px; border-radius:999px;
      background:rgba(0,0,0,.55); border:1px solid rgba(255,180,220,.3);
      color:#ffe0f0; font-size:clamp(.82rem,3vw,1rem);
      text-shadow:0 0 8px #ff6eb4; white-space:nowrap;
      opacity:0; transition:opacity 1s ease .5s; pointer-events:none; z-index:50;
    }
    .pill.visible { opacity:1; }

    /* ── CARD MODAL ── */
    #card-overlay {
      position:fixed; inset:0; z-index:300;
      display:flex; align-items:center; justify-content:center;
      background:rgba(2,0,8,.82); backdrop-filter:blur(14px);
      opacity:0; pointer-events:none; transition:opacity .4s ease;
    }
    #card-overlay.active { opacity:1; pointer-events:all; }
    #card {
      position:relative; max-width:340px; width:88%; border-radius:26px;
      overflow:hidden; text-align:center;
      background:linear-gradient(155deg,#180028 0%,#0a0018 50%,#180010 100%);
      box-shadow:0 0 0 2px rgba(255,110,180,.4), 0 0 40px rgba(255,110,180,.22);
      transform:scale(.82) translateY(22px); transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    }
    #card-overlay.active #card { transform:scale(1) translateY(0); }
    #card::before {
      content:''; position:absolute; inset:0; border-radius:26px; padding:2px;
      background:linear-gradient(135deg,#ffd700,#ff6eb4,#c97fd6,#ff6eb4,#ffd700);
      background-size:300% 300%; animation:borderMove 4s linear infinite;
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude;
    }
    @keyframes borderMove { to { background-position:300% 300%; } }
    .card-inner { position:relative; z-index:1; padding:2.4rem 2rem 2rem; }
    #card-emoji { font-size:2.8rem; display:block; margin-bottom:.8rem; animation:floatY 3s ease-in-out infinite; }
    #card-text  { font-family:'Caveat',cursive; font-size:clamp(1.25rem,5vw,1.6rem); font-weight:700; color:#fff; line-height:1.55; }
    #card-text em { color:#ffd700; font-style:normal; }
    #card-close {
      margin-top:1.6rem; display:inline-block; padding:.4rem 1.5rem; border-radius:50px;
      background:rgba(255,110,180,.12); border:1px solid rgba(255,110,180,.35);
      color:#ffb3d9; font-family:'Caveat',cursive; font-size:1rem; cursor:pointer; transition:background .25s;
    }
    #card-close:hover { background:rgba(255,110,180,.25); }

    /* ── MEDIA PLAYER ── */
    #player {
      position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      background:rgba(5,0,14,.72); border:1px solid rgba(255,180,220,.2);
      border-radius:18px; padding:10px 16px 10px;
      backdrop-filter:blur(10px); z-index:50;
      opacity:0; transition:opacity 1s ease 1s;
      min-width:260px; max-width:92vw;
    }
    #player.visible { opacity:1; }
    #track-name {
      font-family:'Caveat',cursive; font-size:1rem; color:#ffb3d9;
      text-align:center; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; max-width:240px;
    }
    #progress-bar {
      width:100%; height:4px; border-radius:4px;
      background:rgba(255,180,220,.18); cursor:pointer; appearance:none; -webkit-appearance:none;
      accent-color:#ff6eb4;
    }
    .ctrl-row { display:flex; gap:10px; align-items:center; }
    .ctrl-row button {
      width:36px; height:36px; border-radius:50%;
      border:1px solid rgba(255,180,220,.28);
      background:rgba(255,110,180,.1);
      color:#ffe0f0; font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .ctrl-row button:hover { background:rgba(255,110,180,.3); }
    #vol-row { display:flex; gap:8px; align-items:center; width:100%; }
    #vol-row span { font-family:'Caveat',cursive; color:#ffb3d9; font-size:.85rem; }
    #vol-slider {
      flex:1; height:4px; border-radius:4px;
      background:rgba(255,180,220,.18); cursor:pointer; appearance:none; -webkit-appearance:none;
      accent-color:#ff6eb4;
    }
    audio { display:none; }

    /* ── ERROR ── */
    .error { position:fixed; inset:auto 10px 80px; background:#260015; color:#ffd9f7; border:1px solid #ff8ae5; border-radius:10px; padding:10px; font:12px system-ui; display:none; z-index:400; }

    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
    @keyframes pulse  { 0%,100%{opacity:.75} 50%{opacity:1} }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<!-- INTRO -->

  <div id="intro-tulip">🌷</div>

<audio id="audio"></audio>
<div id="err" class="error"></div>

<script>
(function(){
const err = document.getElementById('err');
function showErr(msg){ err.textContent=msg; err.style.display='block'; }

// ══════════════════════════════════════════════════════════════
// MEDIA PLAYER
// Canciones gratuitas de Free Music Archive / Pixabay
// ══════════════════════════════════════════════════════════════
const playlist = [
  { title: '🎵 Canción 1', src: 'assets/music/c1.mp3' },
  { title: '🎵 Canción 2', src: 'assets/music/c2.mp3' },
  { title: '🎵 Canción 3', src: 'assets/music/c3.mp3' },
  { title: '🎵 Canción 4', src: 'assets/music/c4.mp3' },
];

const audio     = document.getElementById('audio');
const playBtn   = document.getElementById('playBtn');
const prevBtn   = document.getElementById('prevBtn');
const nextBtn   = document.getElementById('nextBtn');
const progress  = document.getElementById('progress-bar');
const volSlider = document.getElementById('vol-slider');
const trackName = document.getElementById('track-name');

let trackIdx = 0;
audio.volume = 0.7;

function loadTrack(idx, autoplay=false){
  trackIdx = ((idx % playlist.length) + playlist.length) % playlist.length;
  const t = playlist[trackIdx];
  audio.src = t.src;
  trackName.textContent = t.title;
  progress.value = 0;
  if(autoplay){ audio.play().then(()=>{ playBtn.textContent='⏸'; }).catch(()=>{}); }
  else { playBtn.textContent='▶'; }
}

playBtn.onclick = async ()=>{
  if(audio.src === '' || audio.src === window.location.href){
    loadTrack(0, true); return;
  }
  try{
    if(audio.paused){ await audio.play(); playBtn.textContent='⏸'; }
    else { audio.pause(); playBtn.textContent='▶'; }
  } catch(e){ showErr('No se pudo reproducir. Verifica tu conexión.'); }
};
prevBtn.onclick = ()=> loadTrack(trackIdx-1, !audio.paused);
nextBtn.onclick = ()=> loadTrack(trackIdx+1, !audio.paused);

audio.addEventListener('ended', ()=> loadTrack(trackIdx+1, true));
audio.addEventListener('timeupdate', ()=>{
  if(audio.duration) progress.value = (audio.currentTime/audio.duration)*100;
});
progress.addEventListener('input', ()=>{
  if(audio.duration) audio.currentTime = (progress.value/100)*audio.duration;
});
volSlider.addEventListener('input', ()=>{ audio.volume = volSlider.value; });

// Preload first track info
loadTrack(0, false);

// ══════════════════════════════════════════════════════════════
// WEBGL CHECK
// ══════════════════════════════════════════════════════════════
try{
  const t=document.createElement('canvas').getContext('webgl')||document.createElement('canvas').getContext('experimental-webgl');
  if(!t) throw new Error('no webgl');
} catch(e){ showErr('WebGL no disponible. Usa Chrome/Edge/Firefox con aceleración de hardware.'); return; }

// ══════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════
const phrases = [
  {text:'Feliz cumpleaños, <em>Aracely</em>. Hoy el universo celebra que tú existes 🌷', emoji:'🎂'},
  {text:'Gracias por ser la amiga que siempre <em>está ahí</em>, pase lo que pase', emoji:'💛'},
  {text:'<em>Risitas</em>, tu risa es la mejor canción y tu amistad mi mayor regalo 🎶', emoji:'🎶'},
  {text:'Que este año te traiga todo lo que <em>mereces y más</em>, Ara 🌟', emoji:'✨'},
  {text:'Contigo cada momento se vuelve <em>memorable</em> y especial, Aracely', emoji:'🌸'},
  {text:'Eres de esas personas que hacen que todo sea <em>mejor con solo estar</em>', emoji:'🌷'},
  {text:'Hoy es tu día, <em>Ara</em>, y mereces ser celebrada con todo 🎉', emoji:'🎉'},
  {text:'Qué suerte tan grande tengo de <em>tenerte como amiga</em>, Aracely', emoji:'💖'},
  {text:'<em>Risitas</em>, brillas tanto que hasta las estrellas te admiran ⭐', emoji:'🌟'},
  {text:'Que este cumpleaños marque el inicio de tu <em>mejor año jamás</em>', emoji:'🥂'},

  {text:'¡Que cumplas muchos más llenos de flores, risas y <em>momentos felices</em>, Aracely!', emoji:'🌷'},
];

const labels = [
  "¡Feliz cumple, Ara! 🎂","La mejor amiga 💛","Te quiero mucho 🌷",
  "Risitas 😂💛","Hoy es tu día 🎉","Eres increíble ✨",
  "Mil aventuras más 🌟","Para ti, Aracely 🌷","Mi amiga favorita 💖",
  "Que cumplas más 🥂","Eres un sol 🌞","Tu sonrisa vale todo 😊",
  "Feliz feliz, Ara 🎈","Amiga del alma 💕","Brillas siempre ⭐",
  "Este año será tuyo 🌺","Aracely especial 🌼","Qué suerte tenerte 💫",
  "Salud por ti 🥂","Muchos años más 🌷","Eres mi alegría 💛",
  "Hoy celebramos a Ara 🎊","Risitas querida 🌸","Eres única, Ara 💎",
  "Momentos juntos 🤍","Las mejores risas 😂","Te admiro mucho 🌟",
];

// ══════════════════════════════════════════════════════════════
// THREE.JS
// ══════════════════════════════════════════════════════════════
try{

const canvas   = document.getElementById('galaxy-canvas');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.06;
controls.minDistance    = 12;
controls.maxDistance    = 220;

function setCam(){
  const mob = window.innerWidth<768 || window.innerWidth<window.innerHeight;
  camera.fov = mob?90:75;
  camera.position.set(0, mob?28:22, mob?115:78);
  camera.updateProjectionMatrix(); controls.update();
}
setCam();
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix(); setCam();
});

// ── STARFIELD — pure black background, sharp white dots only ──
function makeStarfield(size=1024, count=3000){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d');
  // True black background — no tint, no glow
  g.fillStyle='#000'; g.fillRect(0,0,size,size);
  for(let i=0;i<count;i++){
    const x=Math.random()*size, y=Math.random()*size;
    const r=Math.random()*1.0+0.25;
    const alpha=(Math.random()*0.55+0.35).toFixed(2);
    g.fillStyle=`rgba(255,255,255,${alpha})`;
    g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
  }
  return new THREE.CanvasTexture(c);
}
const starTex = makeStarfield();
starTex.wrapS = starTex.wrapT = THREE.RepeatWrapping;
const bgSphere = new THREE.Mesh(
  new THREE.SphereGeometry(600,48,48),
  // Normal blending — NO additive, no glow bleed
  new THREE.MeshBasicMaterial({map:starTex, side:THREE.BackSide})
);
scene.add(bgSphere);

// ── GALAXY GROUP ──────────────────────────────────────────────
const galaxy = new THREE.Group();
scene.add(galaxy);

const arms=5, radius=82, maxH=14;

// ── Minimum-separation placement helper ──
// Returns a list of {x,z} positions evenly distributed along
// galaxy spiral arms, guaranteed minDist apart.
function spiralPositions(count, minDist){
  const positions=[];
  let attempts=0;
  let i=0;
  while(positions.length<count && attempts<count*40){
    attempts++;
    const frac = i/count;
    // Archimedean-style spiral per arm
    const arm   = i % arms;
    const step  = Math.floor(i/arms);
    const total = Math.ceil(count/arms);
    const t     = step/total;
    const angle = t*Math.PI*2*2.8 + arm*(Math.PI*2/arms) + (Math.random()-.5)*.18;
    const dist  = (0.12 + t*0.88)*radius + (Math.random()-.5)*3.5;
    const x=Math.cos(angle)*dist, z=Math.sin(angle)*dist;
    // check no existing point is too close
    let ok=true;
    for(const p of positions){
      const dx=p.x-x, dz=p.z-z;
      if(Math.sqrt(dx*dx+dz*dz)<minDist){ ok=false; break; }
    }
    if(ok) positions.push({x,z,dist,angle});
    i++;
  }
  return positions;
}

// Text sprite — bigger font, wider canvas
function makeTextSprite(text){
  const c=document.createElement('canvas'); c.width=1100; c.height=140;
  const g=c.getContext('2d'); g.clearRect(0,0,c.width,c.height);
  g.font='700 56px "Caveat",cursive';
  g.textAlign='center'; g.textBaseline='middle';
  g.strokeStyle='rgba(0,0,0,.55)'; g.lineWidth=4;
  g.strokeText(text,c.width/2,c.height/2);
  g.fillStyle='rgba(255,230,255,0.94)';
  g.fillText(text,c.width/2,c.height/2);
  const tex=new THREE.CanvasTexture(c);
  return new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
}

// Place labels — well separated, bigger scale
const LABEL_N = labels.length * 4; // enough variety without crowding
const labelPos = spiralPositions(LABEL_N, 14); // minDist=14 units
labelPos.forEach((p,i)=>{
  const spr=makeTextSprite(labels[i%labels.length]);
  const thick=Math.pow(1-(Math.min(p.dist,radius)/radius),2);
  const y=(Math.random()-.5)*maxH*thick*.7;
  spr.position.set(p.x, y, p.z);
  spr.scale.set(22, 2.8, 1); // bigger than before
  galaxy.add(spr);
});

// Galaxy particle field — tiny dots
const geoG=new THREE.BufferGeometry(), posG=new Float32Array(6000*3);
for(let i=0;i<6000;i++){
  const ang=Math.random()*Math.PI*2, dist=Math.random()*radius*1.1;
  const y=(Math.random()-.5)*28*Math.pow(1-Math.min(dist,radius)/radius,1.4);
  posG[i*3]=Math.cos(ang)*dist; posG[i*3+1]=y; posG[i*3+2]=Math.sin(ang)*dist;
}
geoG.setAttribute('position',new THREE.BufferAttribute(posG,3));
galaxy.add(new THREE.Points(geoG, new THREE.PointsMaterial({
  color:0xffffff, size:0.22, transparent:true, opacity:0.55
})));

// ── TULIP SPRITES ────────────────────────────────────────────
// 12 vivid, distinct colors
const tulipPalette = [
  {fill:'#ff3d8a',shadow:'#aa0050',accent:'#ff9bce'},
  {fill:'#ff7c00',shadow:'#c04800',accent:'#ffc26e'},
  {fill:'#ffe000',shadow:'#b09000',accent:'#fff7a0'},
  {fill:'#b5e84a',shadow:'#6aaa00',accent:'#dcff90'},
  {fill:'#00cfff',shadow:'#007ab5',accent:'#aaf0ff'},
  {fill:'#7b2fff',shadow:'#4400cc',accent:'#c9a0ff'},
  {fill:'#ff6eb4',shadow:'#cc2277',accent:'#ffb3d9'},
  {fill:'#ff4040',shadow:'#aa0000',accent:'#ff9999'},
  {fill:'#c97fd6',shadow:'#8840b5',accent:'#e8bfff'},
  {fill:'#00e0a0',shadow:'#007a55',accent:'#aaffd8'},
  {fill:'#ff9b6e',shadow:'#d05020',accent:'#ffd0b0'},
  {fill:'#f0e040',shadow:'#a09000',accent:'#fffaaa'},
];

// Realistic classic-cup tulip — 5 wide rounded petals, like the photo
function makeTulipSprite(col, _variant, size=96){
  const c=document.createElement('canvas'); c.width=size*2; c.height=size*2.4;
  const g=c.getContext('2d');
  const cx=size;
  // bottom of stem sits near bottom of canvas
  const stemBot = size*2.35;
  const stemTop = size*1.05; // where petals begin
  const s = size; // scale reference

  // ── STEM ──
  g.strokeStyle='#2e7d32'; g.lineWidth=s*.09; g.lineCap='round';
  g.beginPath();
  g.moveTo(cx, stemBot);
  g.bezierCurveTo(cx+s*.06, stemBot-s*.4, cx-s*.05, stemTop+s*.3, cx, stemTop);
  g.stroke();

  // ── LEAVES (one each side, long & narrow) ──
  // Left leaf
  g.fillStyle='#388e3c';
  g.beginPath();
  g.moveTo(cx, stemBot-s*.55);
  g.bezierCurveTo(cx-s*.7, stemBot-s*.7, cx-s*.85, stemBot-s*1.1, cx-s*.5, stemBot-s*1.25);
  g.bezierCurveTo(cx-s*.3, stemBot-s*1.0, cx-s*.1, stemBot-s*.7, cx, stemBot-s*.55);
  g.fill();
  // Right leaf
  g.beginPath();
  g.moveTo(cx, stemBot-s*.8);
  g.bezierCurveTo(cx+s*.65, stemBot-s*.9, cx+s*.80, stemBot-s*1.3, cx+s*.45, stemBot-s*1.42);
  g.bezierCurveTo(cx+s*.22, stemBot-s*1.15, cx+s*.06, stemBot-s*.9, cx, stemBot-s*.8);
  g.fill();
  // Leaf vein lines
  g.strokeStyle='rgba(56,130,56,.45)'; g.lineWidth=s*.018;
  g.beginPath(); g.moveTo(cx-s*.08,stemBot-s*.58); g.bezierCurveTo(cx-s*.45,stemBot-s*.85,cx-s*.68,stemBot-s*1.08,cx-s*.5,stemBot-s*1.25); g.stroke();
  g.beginPath(); g.moveTo(cx+s*.05,stemBot-s*.82); g.bezierCurveTo(cx+s*.42,stemBot-s*1.0,cx+s*.65,stemBot-s*1.22,cx+s*.45,stemBot-s*1.42); g.stroke();

  // ── PETALS ──
  // 5-petal classic cup: 2 back, 3 front
  // Petal shape: wide ovoid, slightly pointed tip, base at stemTop
  const petalH = s * 1.05;   // petal height
  const petalW = s * 0.46;   // half-width at widest
  const cupBase = stemTop;

  // Helper: draw one petal centered at cx+offX, rotated by angle
  function drawPetal(offX, offY, rx, ry, tiltDeg, fillColor, alpha=1){
    g.save();
    g.globalAlpha = alpha;
    g.fillStyle = fillColor;
    g.translate(cx+offX, cupBase+offY);
    g.rotate(tiltDeg * Math.PI/180);
    // Ovoid petal: wide bottom, tapers to rounded tip
    g.beginPath();
    g.moveTo(0, ry*.12);
    g.bezierCurveTo(-rx, ry*.12, -rx*.88, -ry*.55, -rx*.35, -ry*.92);
    g.bezierCurveTo(-rx*.1, -ry*1.02,  rx*.1, -ry*1.02, rx*.35, -ry*.92);
    g.bezierCurveTo( rx*.88,-ry*.55,  rx, ry*.12, 0, ry*.12);
    g.closePath();
    g.fill();
    g.restore();
  }

  // Inner shading (slightly darker, same hue — creates depth)
  function drawPetalShading(offX, offY, rx, ry, tiltDeg){
    g.save();
    g.translate(cx+offX, cupBase+offY);
    g.rotate(tiltDeg * Math.PI/180);
    // Vein line down centre
    g.strokeStyle='rgba(0,0,0,.12)'; g.lineWidth=rx*.08; g.lineCap='round';
    g.beginPath(); g.moveTo(0, ry*.08); g.bezierCurveTo(0,0, 0,-ry*.6, 0,-ry*.88); g.stroke();
    // Subtle inner shadow at base
    const grd=g.createLinearGradient(0,0,0,-ry*.5);
    grd.addColorStop(0,'rgba(0,0,0,.22)'); grd.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=grd;
    g.beginPath();
    g.moveTo(0,ry*.12);
    g.bezierCurveTo(-rx,ry*.12,-rx*.88,-ry*.55,-rx*.35,-ry*.92);
    g.bezierCurveTo(-rx*.1,-ry*1.02,rx*.1,-ry*1.02,rx*.35,-ry*.92);
    g.bezierCurveTo(rx*.88,-ry*.55,rx,ry*.12,0,ry*.12);
    g.closePath(); g.fill();
    g.restore();
  }

  // Edge highlight for each petal
  function drawPetalEdge(offX, offY, rx, ry, tiltDeg){
    g.save();
    g.translate(cx+offX, cupBase+offY);
    g.rotate(tiltDeg * Math.PI/180);
    g.strokeStyle='rgba(255,255,255,.18)'; g.lineWidth=rx*.06;
    // left edge
    g.beginPath(); g.moveTo(-rx*.6, -ry*.15); g.bezierCurveTo(-rx*.75,-ry*.45,-rx*.5,-ry*.78,-rx*.3,-ry*.9); g.stroke();
    g.restore();
  }

  const rw = petalW, rh = petalH;
  // darker back-petal color
  const dark = col.shadow;
  const main = col.fill;
  // Slight lighter tone for outer petals
  const light = col.accent || col.fill;

  // — 2 back petals (slightly spread, darker) —
  drawPetal(-rw*.55, -rh*.05, rw*.9, rh*.88, -22, dark, .82);
  drawPetalShading(-rw*.55, -rh*.05, rw*.9, rh*.88, -22);
  drawPetal( rw*.55, -rh*.05, rw*.9, rh*.88,  22, dark, .82);
  drawPetalShading( rw*.55, -rh*.05, rw*.9, rh*.88,  22);

  // — 3 front petals (center, left-front, right-front) —
  // Left front
  drawPetal(-rw*.48,  0, rw, rh, -10, main, 1);
  drawPetalShading(-rw*.48, 0, rw, rh, -10);
  drawPetalEdge(-rw*.48, 0, rw, rh, -10);
  // Right front
  drawPetal( rw*.48,  0, rw, rh,  10, main, 1);
  drawPetalShading( rw*.48, 0, rw, rh, 10);
  drawPetalEdge( rw*.48, 0, rw, rh, 10);
  // Center front (slightly taller, lighter)
  drawPetal(0, -rh*.04, rw*.88, rh*1.02, 0, light, 1);
  drawPetalShading(0, -rh*.04, rw*.88, rh*1.02, 0);
  drawPetalEdge(0, -rh*.04, rw*.88, rh*1.02, 0);

  // ── Cup rim / base connector ──
  g.fillStyle=dark;
  g.globalAlpha=.35;
  g.beginPath(); g.ellipse(cx, cupBase, rw*.85, rh*.12, 0, 0, Math.PI*2); g.fill();
  g.globalAlpha=1;

  const mat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c), transparent:true, depthWrite:false});
  return new THREE.Sprite(mat);
}

const tulipSprites = [];
const TULIP_N = 60; // fewer = easier to keep separated

// Get separated positions specifically for tulips (larger minDist)
const tulipPos = spiralPositions(TULIP_N, 18); // minDist=18 — no tulip overlaps

tulipPos.forEach((p, i)=>{
  const col = tulipPalette[i % tulipPalette.length];
  const spr = makeTulipSprite(col, 0, 96);
  spr.isTulip = true;
  spr.phraseIndex = i % phrases.length;
  const thick = Math.pow(1-(Math.min(p.dist,radius)/radius), 2);
  const y = (Math.random()-.5) * maxH * .45;
  spr.position.set(p.x, y, p.z);
  const scW = 5.2 + Math.random()*2.5;
  const scH = scW * 1.2;
  spr.scale.set(scW, scH, 1);
  spr.userData.baseY = y;
  spr.userData.floatPhase  = Math.random()*Math.PI*2;
  spr.userData.floatSpeed  = .35 + Math.random()*.35;
  galaxy.add(spr);
  tulipSprites.push(spr);
});

// ── SATURN PLANET ─────────────────────────────────────────────
const planetR=12;
const pC=document.createElement('canvas'); pC.width=pC.height=256;
const pg=pC.getContext('2d');
const pgrd=pg.createRadialGradient(96,88,8,128,128,128);
pgrd.addColorStop(0,'#ffe8f5'); pgrd.addColorStop(.22,'#f4a0d0'); pgrd.addColorStop(.58,'#cc5fa0'); pgrd.addColorStop(1,'#6a1040');
pg.fillStyle=pgrd; pg.beginPath(); pg.arc(128,128,128,0,Math.PI*2); pg.fill();
pg.fillStyle='rgba(180,80,150,.38)'; pg.fillRect(0,108,256,13);
pg.fillStyle='rgba(180,80,150,.24)'; pg.fillRect(0,130,256,9);
const hgrd=pg.createRadialGradient(95,93,3,105,103,52);
hgrd.addColorStop(0,'rgba(255,255,255,.28)'); hgrd.addColorStop(1,'rgba(255,255,255,0)');
pg.fillStyle=hgrd; pg.fillRect(0,0,256,256);

const planet=new THREE.Mesh(
  new THREE.SphereGeometry(planetR,64,64),
  new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(pC)})
);
planet.renderOrder=2; scene.add(planet);

// Rings — NormalBlending (no additive glow)
function addRing(rIn,rOut,hex,op){
  const m=new THREE.Mesh(
    new THREE.RingGeometry(rIn,rOut,128),
    new THREE.MeshBasicMaterial({color:hex,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false})
  );
  m.rotation.x=-Math.PI/2; m.renderOrder=1; scene.add(m); return m;
}
const ring1=addRing(planetR*1.08,planetR*1.32,0xff9bce,.78);
const ring2=addRing(planetR*1.38,planetR*1.62,0xc97fd6,.68);
const ring3=addRing(planetR*1.68,planetR*1.9, 0xff6eb4,.55);

// Halo — very subtle, NormalBlending
function makeHaloTex(size=512){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const g=c.getContext('2d'); const r=size/2;
  const grd=g.createRadialGradient(r,r,r*.38,r,r,r);
  grd.addColorStop(0,'rgba(255,160,210,.18)');
  grd.addColorStop(.5,'rgba(200,120,240,.08)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grd; g.fillRect(0,0,size,size);
  const t=new THREE.CanvasTexture(c); t.needsUpdate=true; return t;
}
const halo=new THREE.Mesh(
  new THREE.PlaneGeometry(280,280),
  new THREE.MeshBasicMaterial({map:makeHaloTex(),transparent:true,depthWrite:false,opacity:1})
  // NO AdditiveBlending
);
halo.rotation.x=-Math.PI/2; halo.renderOrder=.5; scene.add(halo);

// ── RAYCASTER ─────────────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function onTap(cx,cy){
  if(document.getElementById('card-overlay').classList.contains('active')) return;
  mouse.x=(cx/window.innerWidth)*2-1;
  mouse.y=-(cy/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(tulipSprites);
  if(hits.length>0){
    showCard(phrases[hits[0].object.phraseIndex]);
    burst(cx,cy);
  }
}

// ── CURSOR ────────────────────────────────────────────────────
const cursorEl=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{ cursorEl.style.left=e.clientX+'px'; cursorEl.style.top=e.clientY+'px'; });
document.addEventListener('touchmove',e=>{ const t=e.touches[0]; cursorEl.style.left=t.clientX+'px'; cursorEl.style.top=t.clientY+'px'; },{passive:true});

let pdx=0,pdy=0,pMoved=false;
renderer.domElement.addEventListener('pointerdown',e=>{ pdx=e.clientX;pdy=e.clientY;pMoved=false; cursorEl.classList.add('drag'); });
renderer.domElement.addEventListener('pointermove',e=>{
  if(Math.abs(e.clientX-pdx)>5||Math.abs(e.clientY-pdy)>5) pMoved=true;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  cursorEl.classList.toggle('hover', raycaster.intersectObjects(tulipSprites).length>0 && !pMoved);
});
renderer.domElement.addEventListener('pointerup',e=>{ cursorEl.classList.remove('drag'); if(!pMoved) onTap(e.clientX,e.clientY); });
renderer.domElement.addEventListener('touchend',e=>{ if(!pMoved&&e.changedTouches[0]) onTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY); },{passive:true});

// ── ANIMATE ──────────────────────────────────────────────────
let tw=0;
function animate(){
  requestAnimationFrame(animate);
  const t=performance.now()*.001;
  tw=(tw+.0002)%1; starTex.offset.set(tw,0);
  galaxy.rotation.y=t*.05;
  planet.rotation.y=t*.12;
  ring1.rotation.z=t*.18; ring2.rotation.z=-t*.12; ring3.rotation.z=t*.08;
  halo.rotation.z=t*.02;
  tulipSprites.forEach(s=>{ s.position.y=s.userData.baseY+Math.sin(t*s.userData.floatSpeed+s.userData.floatPhase)*.8; });
  controls.update();
  renderer.render(scene,camera);
}
animate();

} catch(e){ showErr('Error cargando la galaxia: '+e.message); console.error(e); }

// ══════════════════════════════════════════════════════════════
// CARD
// ══════════════════════════════════════════════════════════════
const cardOverlay=document.getElementById('card-overlay');
function showCard(d){ document.getElementById('card-emoji').textContent=d.emoji; document.getElementById('card-text').innerHTML=d.text; cardOverlay.classList.add('active'); }
function hideCard(){ cardOverlay.classList.remove('active'); }
document.getElementById('card-close').addEventListener('click',hideCard);
cardOverlay.addEventListener('click',e=>{ if(e.target===cardOverlay) hideCard(); });

// ══════════════════════════════════════════════════════════════
// BURST PARTICLES
// ══════════════════════════════════════════════════════════════
const fx=document.getElementById('fx'), fxCtx=fx.getContext('2d');
const DPR=Math.min(2,window.devicePixelRatio||1);
function resizeFx(){ fx.width=Math.floor(innerWidth*DPR); fx.height=Math.floor(innerHeight*DPR); fx.style.width=innerWidth+'px'; fx.style.height=innerHeight+'px'; }
addEventListener('resize',resizeFx); resizeFx();

const petals=[];
function burst(x,y,n=18){
  const emo=['🌷','✨','💖','🌸','💛','🌺','💕','🌟','🪷'];
  x*=DPR; y*=DPR;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    petals.push({x,y,vx:Math.cos(a)*(50+Math.random()*70),vy:Math.sin(a)*(50+Math.random()*70)-40,life:1,emoji:emo[Math.floor(Math.random()*emo.length)],size:(14+Math.random()*16)*DPR});
  }
}
let lastTap=0;
addEventListener('click',e=>{ const n=performance.now(); if(n-lastTap<320) burst(e.clientX,e.clientY); lastTap=n; },{passive:true});
addEventListener('touchend',e=>{ const n=performance.now(),t=e.changedTouches&&e.changedTouches[0]; if(n-lastTap<320&&t) burst(t.clientX,t.clientY); lastTap=n; },{passive:true});

(function loopFx(){
  fxCtx.clearRect(0,0,fx.width,fx.height);
  for(let i=petals.length-1;i>=0;i--){
    const p=petals[i];
    p.x+=p.vx*.016; p.y+=p.vy*.016; p.vy+=22; p.life-=.018;
    fxCtx.globalAlpha=Math.max(0,p.life);
    fxCtx.font=`${p.size}px serif`; fxCtx.textAlign='center'; fxCtx.textBaseline='middle';
    fxCtx.fillText(p.emoji,p.x,p.y); fxCtx.globalAlpha=1;
    if(p.life<=0) petals.splice(i,1);
  }
  requestAnimationFrame(loopFx);
})();

// INTRO
// ══════════════════════════════════════════════════════════════
const intro=document.getElementById('intro');
document.getElementById('intro').addEventListener('click',startScene);
document.getElementById('intro').addEventListener('touchend',e=>{ e.preventDefault(); startScene(); });

function startScene(){
  intro.classList.add('out');
  setTimeout(()=>{
    intro.style.display='none';
    document.getElementById('pill').classList.add('visible');
    document.getElementById('player').classList.add('visible');
  },1400);
}

})();
